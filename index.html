<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#faf9f6;--bg2:#f0eeea;--bg3:#e8e5df;--fg:#1a1a18;--fg2:#5c5b56;--fg3:#8a8880;

--bg:#141413;--bg2:#1e1e1c;--bg3:#2a2a27;--fg:#e8e5df;--fg2:#a8a5a0;--fg3:#706e69;

--danger:#e74c5e;--danger-light:#3d1418;--warn:#e0a82e;--warn-light:#3d2e06;

--eagle:#e0b838;--birdie:#e74c5e;--par:#52b788;--bogey:#5b9bd5;--double:#9b85e0;--triple:#7c65d0;
}}
html{font-size:16px}body{font-family:var(--font-body);background:var(--bg);color:var(--fg);line-height:1.55;min-height:100vh}

.ic{border-left:3px solid var(--warn);border-radius:0 var(--radius-lg) var(--radius-lg) 0}
.ic.high{border-left-color:var(--danger)}.ic.positive{border-left-color:var(--positive)}
.ip{font-size:0.54rem;font-weight:600;padding:0.08rem 0.38rem;border-radius:3px;text-transform:uppercase;letter-spacing:0.04em}
.sct{width:100%;border-collapse:collapse;font-size:0.66rem}
.sct th,.sct td{padding:0.25rem 0.1rem;text-align:center}

.hg input,.hg select{padding:0.22rem 0.3rem;font-size:0.74rem;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:var(--font-body)}
.td{grid-column:1/-1;height:1.5px;background:var(--border);margin:0.2rem 0}

.dm{display:flex;gap:0.45rem;flex-wrap:wrap;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.hr{display:grid;grid-template-columns:minmax(0,1fr) 54px 38px 38px 38px;gap:4px;font-size:0.7rem;align-items:center;padding:0.4rem 0}
.hr+.hr{border-top:0.5px solid var(--border)}
.cdt{width:100%;border-collapse:collapse;font-size:0.71rem}
.cdt th,.cdt td{padding:0.32rem 0.4rem;text-align:center;border-bottom:0.5px solid var(--border)}
.cdt th{color:var(--fg3);font-weight:500;font-size:0.58rem;text-transform:uppercase}.cdt td:first-child{text-align:left;font-weight:500}
.fi{animation:fi 0.3s ease}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg);padding:0.55rem 1.1rem;border-radius:var(--radius);font-size:0.78rem;font-weight:500;z-index:1000;animation:ti 0.3s ease,to 0.3s ease 2.2s forwards}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(10px)}}
#fi{display:none}
/* Score gauge */
.gauge{position:relative;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column}
.gauge-val{font-size:1.2rem;font-weight:600;font-family:var(--font-display)}
.gauge-label{font-size:0.52rem;color:var(--fg3);text-transform:uppercase;letter-spacing:0.04em}
.score-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:0.3rem}

.score-info{flex:1;min-width:0}
.score-club-name{font-weight:500;font-size:0.82rem}
.score-club-detail{font-size:0.68rem;color:var(--fg3);margin-top:0.1rem}
.score-value{font-size:1.4rem;font-weight:600;font-family:var(--font-display);min-width:48px;text-align:right}

.cat-score{font-size:2rem;font-weight:600;font-family:var(--font-display)}
.cat-label{font-size:0.62rem;color:var(--fg3);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.15rem}

<body>
<div class="app" id="app"></div>
<input type="file" id="fi" accept=".json,.csv">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

// ═══════════════════════════════════════════════
//  FAIRWAY IQ v3 — Shot-Level Scoring Engine
// ═══════════════════════════════════════════════

const CLUBS=['Dr','3W','Hyb','3i','4i','5i','6i','7i','8i','9i','PW','W50','W56','W60','Putter'];
const LIES=['Tee','Fairway','Rough','Fringe','Green','Bunker','Waste Area'];
const END_LIES=['Fairway','Green','Fringe','Rough','Bunker','Waste Area','Penalty','Hazard'];
const SHAPES=['Neutral','Fade','Draw','Hook','Slice','Straight','Push','Pull'];
const GREENS_COND=['Firm','Medium','Soft'];
const WEATHER_OPTS=['Clear','Windy','Light Rain','Heavy Rain','Fog','Excessive Heat','Cold','Overcast'];
const TEES=['Championship','Blue','White','Gold','Red','Junior'];
const DCLUBS=['Dr','3W','Hyb'];

// ─── PGA TOUR BENCHMARKS ──────────────────
const PGA_CARRY={Dr:282,'3W':249,Hyb:220,'3i':209,'4i':209,'5i':199,'6i':188,'7i':176,'8i':164,'9i':152,PW:142,W50:120,W56:100,W60:80};

// PGA proximity to hole by distance range (yards -> feet)
const PGA_PROX=[
  {min:0,max:10,ft:3},{min:10,max:20,ft:5},{min:20,max:30,ft:7},{min:30,max:50,ft:12},
  {min:50,max:75,ft:16.5},{min:75,max:100,ft:17.8},{min:100,max:125,ft:20.3},
  {min:125,max:150,ft:23.7},{min:150,max:175,ft:28.8},{min:175,max:200,ft:35.8},
  {min:200,max:250,ft:42},{min:250,max:999,ft:50}
];

// PGA putting make % by distance in feet
const PGA_PUTT=[
  {ft:2,pct:99},{ft:3,pct:96},{ft:4,pct:88},{ft:5,pct:77},{ft:6,pct:70},
  {ft:7,pct:61},{ft:8,pct:55},{ft:10,pct:40},{ft:15,pct:23},{ft:20,pct:15},
  {ft:25,pct:10},{ft:30,pct:7},{ft:40,pct:4},{ft:50,pct:3},{ft:60,pct:2}
];

function getPgaProx(yds){
  for(const p of PGA_PROX)if(yds>=p.min&&yds<p.max)return p.ft;
  return 50;
}
function getPgaPuttPct(ft){
  if(ft<=2)return 99;
  for(let i=0;i<PGA_PUTT.length-1;i++){
    if(ft<=PGA_PUTT[i].ft)return PGA_PUTT[i].pct;
    if(ft>PGA_PUTT[i].ft&&ft<=PGA_PUTT[i+1].ft){
      const r=(ft-PGA_PUTT[i].ft)/(PGA_PUTT[i+1].ft-PGA_PUTT[i].ft);
      return PGA_PUTT[i].pct+(PGA_PUTT[i+1].pct-PGA_PUTT[i].pct)*r;
    }
  }
  return 2;
}

// ─── SHOT SCORING ENGINE (0-100) ──────────
function scoreShot(shot){
  if(shot.endLie==='Penalty'||shot.endLie==='Hazard')return{total:0,dist:0,lie:0,shape:0,acc:0,reason:'Penalty'};
  if(shot.club==='Putter')return scorePutt(shot);

  const carry=shot.clubDist||0;
  const pgaCarry=PGA_CARRY[shot.club]||150;

  // Distance score (40%): ratio of carry to PGA avg, capped at 100
  let distScore=0;
  if(carry>0){
    const ratio=carry/pgaCarry;
    distScore=Math.min(ratio*100,100);
    // Bonus: if you exceed PGA avg, score is 100
    if(ratio>=1)distScore=100;
    // Penalty for very short: below 50% of PGA is harsh
    if(ratio<0.5)distScore=ratio*100*0.8;
  }

  // End lie score (25%)
  const lieScores={Green:100,Fairway:90,Fringe:70,Rough:40,'Waste Area':30,Bunker:25,Penalty:0,Hazard:0};
  const lieScore=lieScores[shot.endLie]??50;

  // Shape score (15%)
  const shapeScores={Neutral:100,Straight:100,Fade:95,Draw:95,Push:50,Pull:50,Hook:20,Slice:20};
  const shapeScore=shapeScores[shot.shape]??70;

  // Accuracy score (20%): how close end distance is relative to PGA proximity
  let accScore=50; // default if no data
  const endDist=parseFloat(shot.endDistToHole);
  const startDist=parseFloat(shot.distToHole);
  if(!isNaN(endDist)&&!isNaN(startDist)&&startDist>0){
    const pgaProxFt=getPgaProx(startDist);
    const endDistFt=endDist*3; // convert yards to approx feet
    if(endDistFt<=pgaProxFt)accScore=100; // as good or better than PGA avg
    else{
      const ratio=pgaProxFt/endDistFt;
      accScore=Math.max(ratio*100,5);
    }
  }else if(!isNaN(endDist)){
    // No start dist but have end: score based on absolute proximity
    if(endDist<=3)accScore=95;else if(endDist<=10)accScore=80;
    else if(endDist<=20)accScore=60;else if(endDist<=40)accScore=40;else accScore=20;
  }

  const total=Math.round(distScore*0.4+lieScore*0.25+shapeScore*0.15+accScore*0.2);
  return{total:Math.min(total,100),dist:Math.round(distScore),lie:Math.round(lieScore),shape:Math.round(shapeScore),acc:Math.round(accScore)};
}

function scorePutt(shot){
  const dist=parseFloat(shot.distToHole)||0;
  const endDist=parseFloat(shot.endDistToHole)||0;
  const distFt=dist*3; // yards to feet approx
  const endFt=endDist*3;

  // If putt was holed (endDist=0 or very small)
  const holed=endDist<=0.3;
  const pgaMakePct=getPgaPuttPct(distFt);

  if(holed){
    // Score based on difficulty: making a hard putt scores higher
    if(pgaMakePct>=90)return{total:85,dist:0,lie:0,shape:0,acc:85,reason:'Made putt (expected)'};
    if(pgaMakePct>=60)return{total:90,dist:0,lie:0,shape:0,acc:90,reason:'Made putt (solid)'};
    if(pgaMakePct>=30)return{total:95,dist:0,lie:0,shape:0,acc:95,reason:'Made putt (great)'};
    return{total:100,dist:0,lie:0,shape:0,acc:100,reason:'Made putt (exceptional)'};
  }

  // Not holed: score based on leave distance
  let score=50;
  if(endFt<=3)score=80; // tap-in range
  else if(endFt<=6)score=65; // good lag
  else if(endFt<=10)score=50; // ok
  else if(endFt<=20)score=30; // poor
  else score=15; // very poor lag

  // Adjust for initial distance: long lag putts leaving it close is better
  if(distFt>30&&endFt<=6)score=Math.max(score,75);
  if(distFt>50&&endFt<=10)score=Math.max(score,70);

  return{total:Math.round(score),dist:0,lie:0,shape:0,acc:Math.round(score),reason:'Putt not holed'};
}

// Category scoring for a round
function scoreRound(round){
  const cats={driving:{shots:[],scores:[]},irons:{shots:[],scores:[]},shortGame:{shots:[],scores:[]},putting:{shots:[],scores:[]}};
  const allScores=[];

  (round.holes||[]).forEach(hole=>{
    (hole.shots||[]).forEach((shot,idx)=>{
      const sc=scoreShot(shot);
      allScores.push({...sc,shot,hole:hole.number});

      if(shot.club==='Putter'){
        cats.putting.shots.push(shot);cats.putting.scores.push(sc.total);
      }else if(DCLUBS.includes(shot.club)&&(shot.lie==='Tee'||idx===0)){
        cats.driving.shots.push(shot);cats.driving.scores.push(sc.total);
      }else if(['3i','4i','5i','6i','7i','8i','9i'].includes(shot.club)){
        cats.irons.shots.push(shot);cats.irons.scores.push(sc.total);
      }else{
        cats.shortGame.shots.push(shot);cats.shortGame.scores.push(sc.total);
      }
    });
  });

  const avg=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):null;
  return{
    driving:{score:avg(cats.driving.scores),count:cats.driving.scores.length,shots:cats.driving.shots,scores:cats.driving.scores},
    irons:{score:avg(cats.irons.scores),count:cats.irons.scores.length,shots:cats.irons.shots,scores:cats.irons.scores},
    shortGame:{score:avg(cats.shortGame.scores),count:cats.shortGame.scores.length,shots:cats.shortGame.shots,scores:cats.shortGame.scores},
    putting:{score:avg(cats.putting.scores),count:cats.putting.scores.length,shots:cats.putting.shots,scores:cats.putting.scores},
    allScores,
    overall:avg(allScores.map(s=>s.total)),
  };
}

function scoreColor100(v){
  if(v===null)return'var(--fg3)';
  if(v>=85)return'var(--positive)';if(v>=70)return'var(--info)';
  if(v>=50)return'var(--warn)';return'var(--danger)';
}
function scoreBarColor(v){
  if(v>=85)return'#2d6a4f';if(v>=70)return'#1d4e89';if(v>=50)return'#b07d10';return'#c1121f';
}

// ─── Storage ───────────────────────────
const DB={
  g(k){try{const v=localStorage.getItem('fiq_'+k);return v?JSON.parse(v):null}catch{return null}},
  s(k,v){try{localStorage.setItem('fiq_'+k,JSON.stringify(v))}catch(e){console.error(e)}},
  exp(){return JSON.stringify({version:4,exported:new Date().toISOString(),courses:DB.g('courses')||[],rounds:DB.g('rounds')||[],benchmarks:DB.g('benchmarks')||null},null,2)},
  imp(json){
    const d=JSON.parse(json);if(!d.courses||!d.rounds)throw new Error('Invalid format');
    const ec=DB.g('courses')||[],er=DB.g('rounds')||[];
    const ci=new Set(ec.map(c=>c.id)),ri=new Set(er.map(r=>r.id));
    d.courses.forEach(c=>{if(!ci.has(c.id))ec.push(c)});
    d.rounds.forEach(r=>{if(!ri.has(r.id))er.push(r)});
    DB.s('courses',ec);DB.s('rounds',er);
    if(d.benchmarks)DB.s('benchmarks',d.benchmarks);
    return{courses:ec.length,rounds:er.length};
  }
};

// ─── Preloaded Courses ─────────────────
const MICKE_GROVE={id:'c_micke_grove',name:'Micke Grove Golf Links',tees:'White',rating:69.2,slope:125,holes:[
  {number:1,par:4,yards:364,handicap:3},{number:2,par:4,yards:345,handicap:7},
  {number:3,par:4,yards:305,handicap:9},{number:4,par:3,yards:136,handicap:17},

function analyze(rd){
  const H=rd.holes;let ts=0,tp=0,fw=0,fa=0,gi=0,pu=0,pen=0,ud=0,ua=0,ss=0,sa=0,tp3=0;
  let bi=0,pa=0,bo=0,db=0,ot=0,p3s=0,p3c=0,p4s=0,p4c=0,p5s=0,p5c=0;
  let dm={},am={},sh={},cs={};
  H.forEach(hole=>{
    const shots=hole.shots||[];const s=shots.length||(hole.score||0);ts+=s;tp+=hole.par;const d=s-hole.par;
    if(d<=-1)bi++;else if(d===0)pa++;else if(d===1)bo++;else if(d===2)db++;else if(d>=3)ot++;
    if(hole.par===3){p3c++;p3s+=s}if(hole.par===4){p4c++;p4s+=s}if(hole.par===5){p5c++;p5s+=s}
    const hp=shots.filter(x=>x.club==='Putter').length;pu+=hp;if(hp>=3)tp3++;
    if(hole.par>=4&&shots.length>0){fa++;const t=shots[0];if(t&&t.endLie==='Fairway')fw++;if(t&&t.endLie&&t.endLie!=='Fairway')dm[t.endLie]=(dm[t.endLie]||0)+1}
    const gi_idx=shots.findIndex(x=>x.endLie==='Green');if(gi_idx>=0&&gi_idx<=hole.par-2)gi++;
    const girOk=gi_idx>=0&&gi_idx<=hole.par-2;
    if(!girOk&&shots.length>0){const pi=shots.findIndex(x=>x.club==='Putter');if(pi>0){ua++;if(hp===1)ud++}}
    const fb=shots.filter(x=>x.lie==='Bunker');
    if(fb.length>0){sa++;const li=shots.lastIndexOf(fb[fb.length-1]);if(shots.slice(li+1).filter(x=>x.club==='Putter').length<=1)ss++}
    shots.forEach(x=>{if(x.endLie==='Penalty')pen++;if(x.shape&&x.shape!=='Neutral'&&x.shape!=='Straight')sh[x.shape]=(sh[x.shape]||0)+1;
      if(x.club&&x.club!=='Putter'){if(!cs[x.club])cs[x.club]={ct:0,ds:[],sh:{}};cs[x.club].ct++;const cd=ccd(x);if(cd>0)cs[x.club].ds.push(cd);if(x.shape)cs[x.club].sh[x.shape]=(cs[x.club].sh[x.shape]||0)+1}
      if(!DCLUBS.includes(x.club)&&x.club!=='Putter'&&x.endLie&&x.endLie!=='Green')am[x.endLie]=(am[x.endLie]||0)+1});
  });
  const n=H.length||18;
  return{ts,tp,diff:ts-tp,fwP:fa?Math.round(fw/fa*100):0,fw,fa,girP:n?Math.round(gi/n*100):0,gi,pu,ppg:n?(pu/n).toFixed(1):0,tp3,pen,bi,pa,bo,db,ot,
    udP:ua?Math.round(ud/ua*100):0,ud,ua,ssP:sa?Math.round(ss/sa*100):0,ss,sa,
    p3a:p3c?(p3s/p3c).toFixed(1):'—',p3c,p4a:p4c?(p4s/p4c).toFixed(1):'—',p4c,p5a:p5c?(p5s/p5c).toFixed(1):'—',p5c,dm,am,sh,cs};
}

function genInsights(st){
  const ins=[];
  if(+st.ppg>2.0)ins.push({a:'Putting',p:'high',t:'Putting leak',d:`${st.ppg} putts/hole, ${st.tp3} three-putts.`,dr:'Gate drill: 10 in a row from 6 ft.',im:Math.round((+st.ppg-1.8)*18)});
  else if(st.tp3>=3)ins.push({a:'Putting',p:'high',t:'Three-putt problem',d:`${st.tp3} three-putts.`,dr:'Ladder: 20/30/40 ft, all within 3 ft.',im:st.tp3});
  if(st.girP<40)ins.push({a:'Approaches',p:'high',t:'GIR critically low at '+st.girP+'%',d:'Forces scrambling. Focus on club selection.',dr:'10 shots each 8i/9i/PW to targets.',im:Math.round((0.55-st.girP/100)*18)});
  if(st.fwP<50)ins.push({a:'Driving',p:st.fwP<35?'high':'medium',t:'Fairway accuracy: '+st.fwP+'%',d:'Missing fairways = harder approaches.',dr:'20 drives at 30-yd corridor.',im:Math.round((0.6-st.fwP/100)*14*0.3)});
  if(st.pen>=2)ins.push({a:'Management',p:'high',t:st.pen+' penalty strokes',d:'~'+Math.round(st.pen*1.5)+' total cost.',dr:'Identify safe miss on every hazard shot.',im:Math.round(st.pen*1.5)});
  if(st.udP<40&&st.ua>=4)ins.push({a:'Short game',p:'medium',t:'Up-and-down: '+st.udP+'%',d:`${st.ud}/${st.ua}. Tour avg ~58%.`,dr:'9-shot drill from 20 yds.',im:Math.round((0.55-st.udP/100)*st.ua)});
  const hs=(st.sh['Hook']||0)+(st.sh['Slice']||0);
  if(hs>=4)ins.push({a:'Shot shape',p:'medium',t:'Recurring hook/slice ('+hs+'x)',d:'Amplifies misses.',dr:'Path and face angle work.',im:Math.round(hs*0.5)});
  ins.sort((a,b)=>{const o={high:0,medium:1,positive:2};return(o[a.p]??3)-(o[b.p]??3)||(b.im||0)-(a.im||0)});return ins;
}

  driving_distance:{title:'Add distance off the tee',area:'Driving',drill:'Speed training: make 10 swings with a driver as fast as possible (no ball). Then hit 5 balls at 80% effort. The contrast trains your body to recruit more speed. Also: focus on ground force — push into lead foot to start downswing.',source:'Overspeed training with alignment stick or speed stick. Swing 3 sets of 5 as hard as possible.',freq:'3x per week, 10 min'},
  iron_distance:{title:'Gain iron distance consistency',area:'Irons',drill:'Stock yardage drill: hit 10 balls with your target iron. Ignore the best 2 and worst 2. Average the middle 6 — that is your stock number. Write it down. Repeat for each iron. The key is knowing your REAL distances, not your best-case distances.',source:'Focus on striking the ball first, ground second. Place a tee 2 inches in front of the ball — your divot should start at the tee, not behind the ball.',freq:'1x per week per club, 10 min'},
  iron_accuracy:{title:'Tighten iron dispersion',area:'Irons',drill:'9-shot drill (Hank Haney / Tiger Woods): hit low draw, low straight, low fade, mid draw, mid straight, mid fade, high draw, high straight, high fade. Start with 7 iron. This teaches face and path control. Even attempting it builds awareness.',source:'Alignment stick on ground parallel to target. Check ball position: 7i = center, 6i = 1 ball forward, 8i = 1 ball back. Consistent ball position = consistent contact.',freq:'1x per week, 20 min'},
  iron_short_miss:{title:'Stop leaving irons short',area:'Irons',drill:'One-more-club rule: for 3 rounds, always take one more club than you think you need on every approach. Track results. Most amateurs underclub because they base distance on their best shot, not their average. PGA Tour proximity data shows even pros miss more short than long.',source:'Smooth 80% swings with one more club produce better contact and more consistent distance than 100% swings with the "right" club.',freq:'On course, every round for 3 rounds'},
  shortgame_proximity:{title:'Get up and down more often',area:'Short game',drill:'3-level chip drill: from 15 yards, hit 10 low runners (8 iron), 10 medium pitches (PW), 10 high lobs (SW). All should finish within 6 feet. This builds touch across trajectories. The goal is to have 3 shots for every short game situation.',source:'Clock drill (Dave Pelz): backswing to 7:30, 9:00, and 10:30 positions with your SW. Measure how far each goes. These become your stock wedge distances.',freq:'2x per week, 20 min'},
  shortgame_bunker:{title:'Improve bunker play',area:'Short game',drill:'Line-in-sand drill: draw a line in the sand where the ball would be. Practice hitting the sand 1-2 inches BEHIND the line, splashing through. Do 20 swings with no ball first to build confidence. Then add the ball. Open the clubface at address, not during the swing.',source:'Dollar bill drill: place a dollar bill (or piece of paper) in the bunker. Put ball on the front edge. Your goal is to remove the dollar bill from the sand — the ball rides out on the cushion of sand.',freq:'1x per week, 15 min'},
  shortgame_distance_control:{title:'Wedge distance control',area:'Short game',drill:'Ladder drill: hit W56 to 30, 40, 50, 60, 70, 80 yards using different backswing lengths. Mark your landing spots. The key is controlling backswing length — not decelerating. Always accelerate through. Chart your stock distances for each wedge at each backswing length.',source:'Landing spot focus: pick a specific spot to land the ball, not where you want it to finish. Landing spot control is far more reliable than trying to control total distance.',freq:'2x per week, 15 min'},
  putting_lag:{title:'Eliminate three-putts',area:'Putting',drill:'Ladder drill: set tees at 20, 25, 30, 35, 40 feet. Hit 5 balls from each distance — all must stop within 3 feet of the hole. If any ball is outside 3 feet, restart that distance. Focus on speed, not line. View the putt from the side to judge distance — most amateurs only read from behind.',source:'Fringe drill: putt from 30 feet to the FRINGE of the green. The ball should just trickle onto the fringe and stop. This calibrates your max speed — you now know the absolute furthest the ball can go with that stroke.',freq:'Before every round, 10 min'},
  putting_short:{title:'Make more short putts',area:'Putting',drill:'Gate drill: place 2 tees just wider than your putter head, 5 feet from the hole. Make 10 in a row through the gate. If you miss, restart. This builds face angle control and confidence under pressure. Once you can do 5 ft, move to 6, 7, 8 feet.',source:'Clock drill: place 4 balls at 3 feet (12, 3, 6, 9 o\'clock). Make all 4. Move to 4 feet. Then 5 feet. If you miss, restart that distance. Builds routine and confidence on breaking putts.',freq:'2x per week, 15 min'},
  putting_read:{title:'Better green reading',area:'Putting',drill:'Speed determines break: from 15 feet on a breaking putt, hit 3 balls — one firm (less break), one dying (max break), one medium. See how each speed changes the line. This teaches you that speed and line are connected. Most amateurs underread break because they hit putts too hard.',source:'Walk the full circle around your putt. Look at it from behind the hole too. Feel the slope with your feet. The lowest point tells you which way the ball will break.',freq:'On course, every round'},
  course_mgmt_penalties:{title:'Eliminate penalty strokes',area:'Course management',drill:'Safe miss strategy: before every shot near a hazard, identify where the trouble is and aim to the opposite side. Accept that bogey is a good score from trouble — hero shots lead to doubles and triples. On the range, practice hitting your "bail-out" club (hybrid or 5 iron) to a safe target.',source:'Decision tree: Is there water/OB? If yes, what club guarantees you clear it? If you can\'t clear it 90% of the time, lay up. The math always favors the conservative play for amateurs.',freq:'On course, every round'},
  course_mgmt_scoring:{title:'Better scoring decisions',area:'Course management',drill:'Par is your friend: on par 5s, your goal is the center of the green in 3, not the pin in 2. On tough par 4s, a fairway wood off the tee + full iron to the center of the green is a better play than driver into trouble. Track your score on "conservative strategy" rounds vs. "aggressive" rounds.',source:'Aim for the fat part of the green on approaches, not the flag. PGA Tour pros aim at the flag only 30% of the time — they aim center-green most of the time.',freq:'On course strategy'},
  shape_slice:{title:'Fix the slice pattern',area:'Shot shape',drill:'Inside-out path drill: place an alignment stick 6 inches outside the ball, angled 30 degrees right of target (for right-handers). Swing so the club exits RIGHT of the stick. This forces an inside-out path. Start with half swings and a 7 iron.',source:'Strong grip check: you should see 2.5 to 3 knuckles on your lead hand at address. If you see fewer, your grip is too weak and promotes an open face.',freq:'3x per week, 15 min'},
  shape_hook:{title:'Fix the hook pattern',area:'Shot shape',drill:'Hold-off release drill: hit half shots with a 7 iron where the toe of the club does NOT pass the heel through impact. Feel like the face stays pointing at the target longer. This reduces excessive face closure.',source:'Weaken the trail hand grip slightly — rotate it counterclockwise on the grip. Also check ball position — too far back promotes an in-to-out path that exaggerates hooks.',freq:'2x per week, 15 min'},
};

function analyzeGoals(){
  if(!S.rounds.length)return{areas:[],clubWeaknesses:[],missPatterns:[]};
  const allScored=S.rounds.map(r=>scoreRound(r));
  const allAnalyzed=S.rounds.map(r=>analyze(r));

  // Aggregate category scores
  const catTotals={driving:{scores:[],count:0},irons:{scores:[],count:0},shortGame:{scores:[],count:0},putting:{scores:[],count:0}};
  allScored.forEach(rs=>{
    ['driving','irons','shortGame','putting'].forEach(cat=>{
      if(rs[cat].score!==null){catTotals[cat].scores.push(rs[cat].score);catTotals[cat].count+=rs[cat].count}});
  });
  const catAvg={};
  Object.entries(catTotals).forEach(([k,v])=>{catAvg[k]=v.scores.length?Math.round(v.scores.reduce((s,x)=>s+x,0)/v.scores.length):null});

  // Club-level scores
  const clubAgg={};
  allScored.forEach(rs=>{rs.allScores.forEach(s=>{
    const c=s.shot.club;if(!clubAgg[c])clubAgg[c]={scores:[],count:0};
    clubAgg[c].scores.push(s.total);clubAgg[c].count++})});
  const clubAvgs=Object.entries(clubAgg).map(([club,d])=>({
    club,avg:Math.round(d.scores.reduce((s,v)=>s+v,0)/d.scores.length),count:d.count
  })).filter(c=>c.count>=3).sort((a,b)=>a.avg-b.avg);

  // Miss patterns
  const missAgg={driveMiss:{},approachMiss:{},shapeIssues:{},puttIssues:{threePutts:0,totalRounds:S.rounds.length}};
  allAnalyzed.forEach(st=>{
    Object.entries(st.dm).forEach(([k,v])=>{missAgg.driveMiss[k]=(missAgg.driveMiss[k]||0)+v});
    Object.entries(st.am).forEach(([k,v])=>{missAgg.approachMiss[k]=(missAgg.approachMiss[k]||0)+v});
    Object.entries(st.sh).forEach(([k,v])=>{missAgg.shapeIssues[k]=(missAgg.shapeIssues[k]||0)+v});
    missAgg.puttIssues.threePutts+=st.tp3;
  });

  // Build top 3 improvement areas with drills
  const areas=[];

  // Worst category
  const sortedCats=Object.entries(catAvg).filter(([_,v])=>v!==null).sort((a,b)=>a[1]-b[1]);
  sortedCats.forEach(([cat,score])=>{
    if(areas.length>=3)return;
    let drills=[];
    if(cat==='driving'){
      const topMiss=Object.entries(missAgg.driveMiss).sort((a,b)=>b[1]-a[1])[0];
      const topShape=Object.entries(missAgg.shapeIssues).sort((a,b)=>b[1]-a[1])[0];
      if(topShape&&['Slice','Push'].includes(topShape[0]))drills.push(DRILL_DB.driving_slice);
      else if(topShape&&['Hook','Pull'].includes(topShape[0]))drills.push(DRILL_DB.driving_hook);
      else drills.push(DRILL_DB.driving_accuracy);
      if(score<50)drills.push(DRILL_DB.driving_distance);
    }else if(cat==='irons'){
      const topApproachMiss=Object.entries(missAgg.approachMiss).sort((a,b)=>b[1]-a[1])[0];
      if(topApproachMiss&&topApproachMiss[0]==='Rough')drills.push(DRILL_DB.iron_accuracy);
      else drills.push(DRILL_DB.iron_short_miss);
      drills.push(DRILL_DB.iron_distance);
    }else if(cat==='shortGame'){
      const bunkerMisses=(missAgg.approachMiss['Bunker']||0);
      if(bunkerMisses>=3)drills.push(DRILL_DB.shortgame_bunker);
      else drills.push(DRILL_DB.shortgame_proximity);
      drills.push(DRILL_DB.shortgame_distance_control);
    }else if(cat==='putting'){
      const avgTP=missAgg.puttIssues.threePutts/Math.max(missAgg.puttIssues.totalRounds,1);
      if(avgTP>=2)drills.push(DRILL_DB.putting_lag);
      else drills.push(DRILL_DB.putting_short);
      drills.push(DRILL_DB.putting_read);
    }
    areas.push({cat,catLabel:{driving:'Driving',irons:'Irons',shortGame:'Short game',putting:'Putting'}[cat],score,drills});
  });

  // Add course management if penalties are high
  const avgPen=allAnalyzed.reduce((s,a)=>s+a.pen,0)/allAnalyzed.length;
  if(avgPen>=1.5&&areas.length<4){
    areas.push({cat:'management',catLabel:'Course management',score:Math.round(Math.max(0,100-avgPen*25)),
      drills:[DRILL_DB.course_mgmt_penalties,DRILL_DB.course_mgmt_scoring]});
  }

  // Add shape fix if dominant
  const topShape=Object.entries(missAgg.shapeIssues).sort((a,b)=>b[1]-a[1])[0];
  if(topShape&&topShape[1]>=5&&areas.length<4){
    const drill=topShape[0]==='Slice'||topShape[0]==='Push'?DRILL_DB.shape_slice:DRILL_DB.shape_hook;
    areas.push({cat:'shape',catLabel:'Shot shape ('+topShape[0]+')',score:Math.round(Math.max(0,100-topShape[1]*5)),drills:[drill]});
  }

  return{areas:areas.slice(0,3),clubWeaknesses:clubAvgs.slice(0,5),missPatterns:missAgg};
}

function rGoals(el){
  if(!S.rounds.length){el.appendChild(h('div',{class:'card',style:{textAlign:'center',padding:'2rem',color:'var(--fg3)'}},'Enter rounds to generate improvement goals.'));return}

  const goals=analyzeGoals();

  el.appendChild(h('div',{class:'st'},'Top 3 areas to improve'));
  el.appendChild(h('div',{style:{fontSize:'0.74rem',color:'var(--fg2)',marginBottom:'1rem',lineHeight:1.5}},
    `Based on ${S.rounds.length} round${S.rounds.length>1?'s':''}, here are your highest-impact improvement areas with targeted practice drills.`));

  goals.areas.forEach((area,idx)=>{
    const card=h('div',{class:'card',style:{marginBottom:'0.85rem',borderLeft:`3px solid ${area.score<40?'var(--danger)':area.score<60?'var(--warn)':'var(--info)'}`,borderRadius:'0 var(--radius-lg) var(--radius-lg) 0'}});

    // Header
    card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.6rem'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:'0.5rem'}},
        h('span',{style:{width:'26px',height:'26px',borderRadius:'50%',background:'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.72rem',fontWeight:600}},String(idx+1)),
        h('span',{style:{fontSize:'0.95rem',fontWeight:500}},area.catLabel)),
      h('div',{style:{display:'flex',alignItems:'center',gap:'0.5rem'}},
        h('span',{style:{fontSize:'0.62rem',color:'var(--fg3)',textTransform:'uppercase'}},'Score'),
        h('span',{style:{fontSize:'1.2rem',fontWeight:600,fontFamily:'var(--font-display)',color:scoreColor100(area.score)}},String(area.score)),
        h('div',{style:{width:'50px'}},h('div',{class:'score-bar'},h('div',{class:'score-fill',style:{width:area.score+'%',background:scoreBarColor(area.score)}})))
      )
    ));

    // Drills
    area.drills.forEach(drill=>{
      if(!drill)return;
      const drillEl=h('div',{style:{background:'var(--bg2)',borderRadius:'var(--radius)',padding:'0.75rem 0.9rem',marginBottom:'0.5rem'}});
      drillEl.appendChild(h('div',{style:{fontWeight:500,fontSize:'0.84rem',marginBottom:'0.35rem',color:'var(--accent)'}},drill.title));
      drillEl.appendChild(h('div',{style:{fontSize:'0.74rem',color:'var(--fg2)',lineHeight:1.55,marginBottom:'0.35rem'}},drill.drill));
      drillEl.appendChild(h('div',{style:{fontSize:'0.72rem',color:'var(--fg2)',lineHeight:1.5,fontStyle:'italic',marginBottom:'0.25rem'}},drill.source));
      drillEl.appendChild(h('div',{style:{fontSize:'0.62rem',color:'var(--fg3)',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.04em'}},'Frequency: '+drill.freq));
      card.appendChild(drillEl);
    });
    el.appendChild(card);
  });

  // Weakest clubs
  if(goals.clubWeaknesses.length>0){
    el.appendChild(h('div',{class:'st',style:{marginTop:'0.75rem'}},'Weakest performing clubs'));
    const tbl=h('div',{class:'card'});
    goals.clubWeaknesses.forEach(cw=>{
      tbl.appendChild(h('div',{class:'score-section'},
        h('div',{class:'score-info'},
          h('div',{class:'score-club-name'},cw.club),
          h('div',{class:'score-club-detail'},cw.count+' total shots'+(PGA_CARRY[cw.club]?' · PGA benchmark: '+PGA_CARRY[cw.club]+'y':''))),
        h('div',{class:'score-value',style:{color:scoreColor100(cw.avg)}},String(cw.avg)),
        h('div',{style:{width:'70px'}},h('div',{class:'score-bar'},h('div',{class:'score-fill',style:{width:cw.avg+'%',background:scoreBarColor(cw.avg)}})))
      ));
    });
    el.appendChild(tbl);
  }

  // Miss patterns summary
  const mp=goals.missPatterns;
  const topDM=Object.entries(mp.driveMiss).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topAM=Object.entries(mp.approachMiss).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topSH=Object.entries(mp.shapeIssues).sort((a,b)=>b[1]-a[1]).slice(0,3);

  if(topDM.length||topAM.length||topSH.length){
    el.appendChild(h('div',{class:'st',style:{marginTop:'0.75rem'}},'Miss patterns'));
    const patCard=h('div',{class:'card'});

    if(topDM.length){
      patCard.appendChild(h('div',{style:{fontSize:'0.68rem',fontWeight:500,color:'var(--fg3)',textTransform:'uppercase',marginBottom:'0.3rem'}},'Drives missing to'));
      patCard.appendChild(h('div',{style:{display:'flex',gap:'0.3rem',flexWrap:'wrap',marginBottom:'0.6rem'}},
        ...topDM.map(([k,v])=>h('span',{class:'ct',style:{fontSize:'0.7rem'}},k+': '+v+'x'))));
    }
    if(topAM.length){
      patCard.appendChild(h('div',{style:{fontSize:'0.68rem',fontWeight:500,color:'var(--fg3)',textTransform:'uppercase',marginBottom:'0.3rem'}},'Approaches ending in'));
      patCard.appendChild(h('div',{style:{display:'flex',gap:'0.3rem',flexWrap:'wrap',marginBottom:'0.6rem'}},
        ...topAM.map(([k,v])=>h('span',{class:'ct',style:{fontSize:'0.7rem'}},k+': '+v+'x'))));
    }
    if(topSH.length){
      patCard.appendChild(h('div',{style:{fontSize:'0.68rem',fontWeight:500,color:'var(--fg3)',textTransform:'uppercase',marginBottom:'0.3rem'}},'Dominant miss shapes'));
      patCard.appendChild(h('div',{style:{display:'flex',gap:'0.3rem',flexWrap:'wrap'}},
        ...topSH.map(([k,v])=>h('span',{class:'ct',style:{fontSize:'0.7rem'}},k+': '+v+'x'))));
    }
    el.appendChild(patCard);
  }

  // Practice schedule suggestion
  el.appendChild(h('div',{class:'st',style:{marginTop:'0.75rem'}},'Suggested weekly practice'));
  const schedCard=h('div',{class:'card'});
  const schedule=[];
  if(goals.areas[0])schedule.push({day:'Session 1',focus:goals.areas[0].catLabel,time:'20 min',detail:goals.areas[0].drills[0]?.title||'Work on weakest area'});
  if(goals.areas[1])schedule.push({day:'Session 2',focus:goals.areas[1].catLabel,time:'20 min',detail:goals.areas[1].drills[0]?.title||'Work on second area'});
  if(goals.areas[2])schedule.push({day:'Session 3',focus:goals.areas[2].catLabel,time:'15 min',detail:goals.areas[2].drills[0]?.title||'Work on third area'});
  schedule.push({day:'Pre-round',focus:'Putting + tempo',time:'15 min',detail:'Ladder drill for lag, then 10 putts from 4 feet for confidence'});

  schedule.forEach(s=>{
    schedCard.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'0.7rem',padding:'0.45rem 0',borderBottom:'0.5px solid var(--border)'}},
      h('div',{style:{minWidth:'70px',fontSize:'0.68rem',fontWeight:500,color:'var(--accent)'}},s.day),
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:'0.78rem',fontWeight:500}},s.focus),
        h('div',{style:{fontSize:'0.66rem',color:'var(--fg3)'}},s.detail)),
      h('div',{style:{fontSize:'0.66rem',color:'var(--fg3)',minWidth:'40px',textAlign:'right'}},s.time)
    ));
  });
  el.appendChild(schedCard);
}

// ─── ROUNDS ────────────────────────────
function rR(el){if(!S.rounds.length){el.appendChild(h('div',{class:'card',style:{textAlign:'center',padding:'2rem',color:'var(--fg3)'}},'No rounds yet.'));return}
  el.appendChild(h('div',{class:'st'},'All rounds'));
  S.rounds.slice().reverse().forEach(r=>{const s=analyze(r),sc2=scoreRound(r),c=r.conditions,tags=[];
    if(c){if(c.greens)tags.push(c.greens);if(c.weather)c.weather.forEach(w=>tags.push(w))}
    el.appendChild(h('div',{class:'card',style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.55rem 0.85rem'}},
      h('div',null,h('div',{style:{fontWeight:500,fontSize:'0.86rem'}},r.courseName),
        h('div',{style:{fontSize:'0.68rem',color:'var(--fg3)'}},`${r.date} · ${s.ts} (${s.diff>=0?'+':''}${s.diff}) · IQ: `,h('span',{style:{fontWeight:600,color:scoreColor100(sc2.overall)}},sc2.overall!==null?String(sc2.overall):'—')),
        tags.length?h('div',{style:{display:'flex',gap:'0.2rem',flexWrap:'wrap',marginTop:'0.15rem'}},...tags.map(t=>h('span',{class:'ct'},t))):null),
      h('div',{style:{display:'flex',gap:'0.3rem'}},
        h('button',{class:'btn s',onClick:()=>{S.sri=r.id;S.tab='scores';S.av='single';render()}},'Scores'),
        h('button',{class:'btn s',onClick:()=>{S.sri=r.id;S.tab='analysis';render()}},'Stats'),
        h('button',{class:'btn s d',onClick:()=>{if(confirm('Delete?')){S.rounds=S.rounds.filter(x=>x.id!==r.id);sv();render()}}},'Del'))));
  })}

function xp(){const b=new Blob([DB.exp()],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fairway-iq-'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(a.href);toast('Exported')}
$('#fi').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{const res=DB.imp(ev.target.result);S.courses=DB.g('courses')||[];S.rounds=DB.g('rounds')||[];
    toast(`Imported: ${res.courses} courses, ${res.rounds} rounds`);render()}catch(err){toast('Error: '+err.message)}};r.readAsText(f);this.value=''});

render();
