<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

--bg:#faf9f6;--bg2:#f0eeea;--bg3:#e8e5df;--fg:#1a1a18;--fg2:#5c5b56;--fg3:#8a8880;

.fi{animation:fi 0.3s ease}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

#fi{display:none}
/* Score gauge */
.gauge{position:relative;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column}
.gauge-val{font-size:1.2rem;font-weight:600;font-family:var(--font-display)}

.score-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:0.3rem}

.score-club-detail{font-size:0.68rem;color:var(--fg3);margin-top:0.1rem}
.score-value{font-size:1.4rem;font-weight:600;font-family:var(--font-display);min-width:48px;text-align:right}

<body>
<div class="app" id="app"></div>
<input type="file" id="fi" accept=".json,.csv">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

// ═══════════════════════════════════════════════
//  FAIRWAY IQ v3 — Shot-Level Scoring Engine
// ═══════════════════════════════════════════════

const CLUBS=['Dr','3W','Hyb','3i','4i','5i','6i','7i','8i','9i','PW','W50','W56','W60','Putter'];
const LIES=['Tee','Fairway','Rough','Fringe','Green','Bunker','Waste Area'];
const END_LIES=['Fairway','Green','Fringe','Rough','Bunker','Waste Area','Penalty','Hazard'];
const SHAPES=['Neutral','Fade','Draw','Hook','Slice','Straight','Push','Pull'];
const GREENS_COND=['Firm','Medium','Soft'];
const WEATHER_OPTS=['Clear','Windy','Light Rain','Heavy Rain','Fog','Excessive Heat','Cold','Overcast'];
const TEES=['Championship','Blue','White','Gold','Red','Junior'];
const DCLUBS=['Dr','3W','Hyb'];

// ─── PGA TOUR BENCHMARKS ──────────────────
const PGA_CARRY={Dr:282,'3W':249,Hyb:220,'3i':209,'4i':209,'5i':199,'6i':188,'7i':176,'8i':164,'9i':152,PW:142,W50:120,W56:100,W60:80};

// PGA proximity to hole by distance range (yards -> feet)
const PGA_PROX=[
  {min:0,max:10,ft:3},{min:10,max:20,ft:5},{min:20,max:30,ft:7},{min:30,max:50,ft:12},
  {min:50,max:75,ft:16.5},{min:75,max:100,ft:17.8},{min:100,max:125,ft:20.3},
  {min:125,max:150,ft:23.7},{min:150,max:175,ft:28.8},{min:175,max:200,ft:35.8},
  {min:200,max:250,ft:42},{min:250,max:999,ft:50}
];

// PGA putting make % by distance in feet
const PGA_PUTT=[
  {ft:2,pct:99},{ft:3,pct:96},{ft:4,pct:88},{ft:5,pct:77},{ft:6,pct:70},
  {ft:7,pct:61},{ft:8,pct:55},{ft:10,pct:40},{ft:15,pct:23},{ft:20,pct:15},
  {ft:25,pct:10},{ft:30,pct:7},{ft:40,pct:4},{ft:50,pct:3},{ft:60,pct:2}
];

function getPgaProx(yds){
  for(const p of PGA_PROX)if(yds>=p.min&&yds<p.max)return p.ft;
  return 50;
}
function getPgaPuttPct(ft){
  if(ft<=2)return 99;
  for(let i=0;i<PGA_PUTT.length-1;i++){
    if(ft<=PGA_PUTT[i].ft)return PGA_PUTT[i].pct;
    if(ft>PGA_PUTT[i].ft&&ft<=PGA_PUTT[i+1].ft){
      const r=(ft-PGA_PUTT[i].ft)/(PGA_PUTT[i+1].ft-PGA_PUTT[i].ft);
      return PGA_PUTT[i].pct+(PGA_PUTT[i+1].pct-PGA_PUTT[i].pct)*r;
    }
  }
  return 2;
}

// ─── SHOT SCORING ENGINE (0-125) ──────────
const MAX_SCORE=125;

function scoreShot(shot){
  if(shot.endLie==='Penalty'||shot.endLie==='Hazard')return{total:0,dist:0,lie:0,shape:0,acc:0,reason:'Penalty'};
  if(shot.club==='Putter')return scorePutt(shot);

  const carry=shot.clubDist||0;
  const pgaCarry=PGA_CARRY[shot.club]||150;

  // Distance score (40%): ratio of carry to PGA avg, scaled to 125
  let distScore=0;
  if(carry>0){
    const ratio=carry/pgaCarry;
    if(ratio>=1)distScore=MAX_SCORE; // meets or exceeds PGA = perfect 125
    else if(ratio>=0.85)distScore=100+(ratio-0.85)/(1-0.85)*25; // 85-100% of PGA = 100-125
    else if(ratio>=0.5)distScore=ratio/0.85*100; // 50-85% = scaled 0-100
    else distScore=ratio*100*0.8; // below 50% = harsh penalty
  }

  // End lie score (25%)
  const lieScores={Green:MAX_SCORE,Fairway:110,Fringe:85,Rough:50,'Waste Area':35,Bunker:30,Penalty:0,Hazard:0};
  const lieScore=lieScores[shot.endLie]??60;

  // Shape score (15%)
  const shapeScores={Neutral:MAX_SCORE,Straight:MAX_SCORE,Fade:118,Draw:118,Push:60,Pull:60,Hook:25,Slice:25};
  const shapeScore=shapeScores[shot.shape]??85;

  // Accuracy score (20%): how close end distance is relative to PGA proximity
  let accScore=60; // default if no data
  const endDist=parseFloat(shot.endDistToHole);
  const startDist=parseFloat(shot.distToHole);
  if(!isNaN(endDist)&&!isNaN(startDist)&&startDist>0){
    const pgaProxFt=getPgaProx(startDist);
    const endDistFt=endDist*3; // convert yards to approx feet
    if(endDistFt<=pgaProxFt*0.5)accScore=MAX_SCORE; // way better than PGA avg
    else if(endDistFt<=pgaProxFt)accScore=100+(1-endDistFt/pgaProxFt)*50; // better than PGA = 100-125
    else{
      const ratio=pgaProxFt/endDistFt;
      accScore=Math.max(ratio*100,5);
    }
  }else if(!isNaN(endDist)){
    if(endDist<=1)accScore=MAX_SCORE;else if(endDist<=3)accScore=115;else if(endDist<=10)accScore=95;
    else if(endDist<=20)accScore=70;else if(endDist<=40)accScore=45;else accScore=20;
  }

  const total=Math.round(distScore*0.4+lieScore*0.25+shapeScore*0.15+accScore*0.2);
  return{total:Math.min(total,MAX_SCORE),dist:Math.round(distScore),lie:Math.round(lieScore),shape:Math.round(shapeScore),acc:Math.round(accScore)};
}

function scorePutt(shot){
  const dist=parseFloat(shot.distToHole)||0;
  const endDist=parseFloat(shot.endDistToHole)||0;
  const distFt=dist*3; // yards to feet approx
  const endFt=endDist*3;

  const holed=endDist<=0.3;
  const pgaMakePct=getPgaPuttPct(distFt);

  if(holed){
    // Making a hard putt scores higher — scale to 125
    if(pgaMakePct>=90)return{total:100,dist:0,lie:0,shape:0,acc:100,reason:'Made putt (expected)'};
    if(pgaMakePct>=60)return{total:110,dist:0,lie:0,shape:0,acc:110,reason:'Made putt (solid)'};
    if(pgaMakePct>=30)return{total:118,dist:0,lie:0,shape:0,acc:118,reason:'Made putt (great)'};
    return{total:MAX_SCORE,dist:0,lie:0,shape:0,acc:MAX_SCORE,reason:'Made putt (exceptional)'};
  }

  // Not holed: score based on leave distance
  let score=60;
  if(endFt<=3)score=95; // tap-in range
  else if(endFt<=6)score=80; // good lag
  else if(endFt<=10)score=60; // ok
  else if(endFt<=20)score=35; // poor
  else score=15; // very poor lag

  // Adjust for initial distance: long lag putts leaving it close is better
  if(distFt>30&&endFt<=3)score=Math.max(score,100);
  if(distFt>30&&endFt<=6)score=Math.max(score,90);
  if(distFt>50&&endFt<=10)score=Math.max(score,85);

  return{total:Math.round(score),dist:0,lie:0,shape:0,acc:Math.round(score),reason:'Putt not holed'};
}

// Category scoring for a round
function scoreRound(round){
  const cats={driving:{shots:[],scores:[]},irons:{shots:[],scores:[]},shortGame:{shots:[],scores:[]},putting:{shots:[],scores:[]}};
  const allScores=[];

  (round.holes||[]).forEach(hole=>{
    (hole.shots||[]).forEach((shot,idx)=>{
      const sc=scoreShot(shot);
      allScores.push({...sc,shot,hole:hole.number});

      if(shot.club==='Putter'){
        cats.putting.shots.push(shot);cats.putting.scores.push(sc.total);
      }else if(DCLUBS.includes(shot.club)&&(shot.lie==='Tee'||idx===0)){
        cats.driving.shots.push(shot);cats.driving.scores.push(sc.total);
      }else if(['3i','4i','5i','6i','7i','8i','9i'].includes(shot.club)){
        cats.irons.shots.push(shot);cats.irons.scores.push(sc.total);
      }else{
        cats.shortGame.shots.push(shot);cats.shortGame.scores.push(sc.total);
      }
    });
  });

  const avg=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):null;
  return{
    driving:{score:avg(cats.driving.scores),count:cats.driving.scores.length,shots:cats.driving.shots,scores:cats.driving.scores},
    irons:{score:avg(cats.irons.scores),count:cats.irons.scores.length,shots:cats.irons.shots,scores:cats.irons.scores},
    shortGame:{score:avg(cats.shortGame.scores),count:cats.shortGame.scores.length,shots:cats.shortGame.shots,scores:cats.shortGame.scores},
    putting:{score:avg(cats.putting.scores),count:cats.putting.scores.length,shots:cats.putting.shots,scores:cats.putting.scores},
    allScores,
    overall:avg(allScores.map(s=>s.total)),
  };
}

function scoreColor100(v){
  if(v===null)return'var(--fg3)';
  if(v>=105)return'var(--positive)';if(v>=85)return'var(--info)';
  if(v>=60)return'var(--warn)';return'var(--danger)';
}
function scoreBarColor(v){
  if(v>=105)return'#2d6a4f';if(v>=85)return'#1d4e89';if(v>=60)return'#b07d10';return'#c1121f';
}
function scoreBarWidth(v){return Math.min((v||0)/125*100,100)+'%'}

// ─── Storage ───────────────────────────
const DB={
  g(k){try{const v=localStorage.getItem('fiq_'+k);return v?JSON.parse(v):null}catch{return null}},
  s(k,v){try{localStorage.setItem('fiq_'+k,JSON.stringify(v))}catch(e){console.error(e)}},
  exp(){return JSON.stringify({version:4,exported:new Date().toISOString(),courses:DB.g('courses')||[],rounds:DB.g('rounds')||[],benchmarks:DB.g('benchmarks')||null},null,2)},
  imp(json){
    const d=JSON.parse(json);if(!d.courses||!d.rounds)throw new Error('Invalid format');
    const ec=DB.g('courses')||[],er=DB.g('rounds')||[];
    const ci=new Set(ec.map(c=>c.id)),ri=new Set(er.map(r=>r.id));
    d.courses.forEach(c=>{if(!ci.has(c.id))ec.push(c)});
    d.rounds.forEach(r=>{if(!ri.has(r.id))er.push(r)});
    DB.s('courses',ec);DB.s('rounds',er);
    if(d.benchmarks)DB.s('benchmarks',d.benchmarks);
    return{courses:ec.length,rounds:er.length};
  }
};

(function seedCourses(){
  const existing=DB.g('courses')||[];
  const ids=new Set(existing.map(c=>c.id));
  // Keep Micke Grove White that was already there
  if(!ids.has('c_micke_grove')){existing.push(MICKE_GROVE);ids.add('c_micke_grove')}

  DB.s('courses',existing);

function analyze(rd){
  const H=rd.holes;let ts=0,tp=0,fw=0,fa=0,gi=0,pu=0,pen=0,ud=0,ua=0,ss=0,sa=0,tp3=0;
  let bi=0,pa=0,bo=0,db=0,ot=0,p3s=0,p3c=0,p4s=0,p4c=0,p5s=0,p5c=0;

  H.forEach(hole=>{
    const shots=hole.shots||[];const s=shots.length||(hole.score||0);ts+=s;tp+=hole.par;const d=s-hole.par;
    if(d<=-1)bi++;else if(d===0)pa++;else if(d===1)bo++;else if(d===2)db++;else if(d>=3)ot++;
    if(hole.par===3){p3c++;p3s+=s}if(hole.par===4){p4c++;p4s+=s}if(hole.par===5){p5c++;p5s+=s}
    const hp=shots.filter(x=>x.club==='Putter').length;pu+=hp;if(hp>=3)tp3++;

    const gi_idx=shots.findIndex(x=>x.endLie==='Green');if(gi_idx>=0&&gi_idx<=hole.par-2)gi++;
    const girOk=gi_idx>=0&&gi_idx<=hole.par-2;

    const fb=shots.filter(x=>x.lie==='Bunker');
    if(fb.length>0){sa++;const li=shots.lastIndexOf(fb[fb.length-1]);if(shots.slice(li+1).filter(x=>x.club==='Putter').length<=1)ss++}
    shots.forEach(x=>{if(x.endLie==='Penalty')pen++;if(x.shape&&x.shape!=='Neutral'&&x.shape!=='Straight')sh[x.shape]=(sh[x.shape]||0)+1;
      if(x.club&&x.club!=='Putter'){if(!cs[x.club])cs[x.club]={ct:0,ds:[],sh:{}};cs[x.club].ct++;const cd=ccd(x);if(cd>0)cs[x.club].ds.push(cd);if(x.shape)cs[x.club].sh[x.shape]=(cs[x.club].sh[x.shape]||0)+1}
      if(!DCLUBS.includes(x.club)&&x.club!=='Putter'&&x.endLie&&x.endLie!=='Green')am[x.endLie]=(am[x.endLie]||0)+1});
  });
  const n=H.length||18;

}

function genInsights(st){
  const ins=[];
  if(+st.ppg>2.0)ins.push({a:'Putting',p:'high',t:'Putting leak',d:`${st.ppg} putts/hole, ${st.tp3} three-putts.`,dr:'Gate drill: 10 in a row from 6 ft.',im:Math.round((+st.ppg-1.8)*18)});
  else if(st.tp3>=3)ins.push({a:'Putting',p:'high',t:'Three-putt problem',d:`${st.tp3} three-putts.`,dr:'Ladder: 20/30/40 ft, all within 3 ft.',im:st.tp3});
  if(st.girP<40)ins.push({a:'Approaches',p:'high',t:'GIR critically low at '+st.girP+'%',d:'Forces scrambling. Focus on club selection.',dr:'10 shots each 8i/9i/PW to targets.',im:Math.round((0.55-st.girP/100)*18)});
  if(st.fwP<50)ins.push({a:'Driving',p:st.fwP<35?'high':'medium',t:'Fairway accuracy: '+st.fwP+'%',d:'Missing fairways = harder approaches.',dr:'20 drives at 30-yd corridor.',im:Math.round((0.6-st.fwP/100)*14*0.3)});
  if(st.pen>=2)ins.push({a:'Management',p:'high',t:st.pen+' penalty strokes',d:'~'+Math.round(st.pen*1.5)+' total cost.',dr:'Identify safe miss on every hazard shot.',im:Math.round(st.pen*1.5)});
  if(st.udP<40&&st.ua>=4)ins.push({a:'Short game',p:'medium',t:'Up-and-down: '+st.udP+'%',d:`${st.ud}/${st.ua}. Tour avg ~58%.`,dr:'9-shot drill from 20 yds.',im:Math.round((0.55-st.udP/100)*st.ua)});
  const hs=(st.sh['Hook']||0)+(st.sh['Slice']||0);
  if(hs>=4)ins.push({a:'Shot shape',p:'medium',t:'Recurring hook/slice ('+hs+'x)',d:'Amplifies misses.',dr:'Path and face angle work.',im:Math.round(hs*0.5)});
  ins.sort((a,b)=>{const o={high:0,medium:1,positive:2};return(o[a.p]??3)-(o[b.p]??3)||(b.im||0)-(a.im||0)});return ins;
}

      h('div',{style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:S.sri===r.id?500:400,color:S.sri===r.id?'var(--fg)':'var(--fg2)'}},r.date+' — '+r.courseName),
      h('div',{style:{textAlign:'center',fontWeight:500}},s.ts+' ('+(s.diff>=0?'+':'')+s.diff+')'),
      h('div',{style:{textAlign:'center'}},s.fwP+'%'),h('div',{style:{textAlign:'center'}},s.girP+'%'),
      h('div',{style:{textAlign:'center',fontWeight:600,color:scoreColor100(sc2.overall)}},sc2.overall!==null?String(sc2.overall):'—')))});
  el.appendChild(cd)}

const DRILL_DB={
  driving_slice:{title:'Fix the slice — ground force & path',area:'Driving',
    drill:'@theforceplateguy (Michael Dutro): The slice comes from an over-the-top move caused by poor pressure shift. Focus on loading the trail foot in the backswing, then shifting pressure to the lead foot BEFORE the arms start down. This creates space for an inside path. Feel the ground push — the swing is a reaction to how you use the ground.',
    source:'@dannymaude (Danny Maude): Grip check — you should see 2.5–3 knuckles on your lead hand. A weak grip forces the face open. Also try the Catapult Method: feel like you\'re slinging the club from the inside, letting centrifugal force square the face rather than steering with your hands.',
    freq:'2x per week, 15 min'},
  driving_hook:{title:'Tame the hook — trail arm control',area:'Driving',
    drill:'Pete Cowen trail arm method: the trail arm controls the clubface through impact. Practice half swings feeling the trail arm stay in front of your body through the hitting zone. The feel is the right elbow stays close to the right hip. This prevents the face from closing too quickly.',
    source:'@dannymaude (Danny Maude): Hold-off release drill — hit half shots where the toe does NOT pass the heel through impact. Feel the face pointing at the target longer. Also check ball position — too far back promotes an in-to-out path that exaggerates hooks.',
    freq:'2x per week, 15 min'},
  driving_accuracy:{title:'Find more fairways — body-arms sync',area:'Driving',
    drill:'@dannymaude (Danny Maude) Screw Drill: imagine screws under each armpit connecting your arms to your body. Set up with club in front like it\'s resting on a table. Swing back and through feeling the arms stay connected to the body turn. This eliminates the arms running away from the body, which is the #1 cause of inconsistency off the tee.',
    source:'@theforceplateguy (Michael Dutro): The golf swing is a human making a motion on planet earth — understand the cause-and-effect. Your pressure pattern determines your path. Practice feeling pressure move from center to trail foot to lead foot in sequence. When the sequence is right, the club drops into the slot naturally.',
    freq:'Every range session, 10 min'},
  driving_distance:{title:'Add distance — ground reaction forces',area:'Driving',
    drill:'@theforceplateguy (Michael Dutro): Speed comes from the ground up. Push into the lead foot to start the downswing — this creates vertical force that translates to rotational speed. Practice jumping drills: swing to the top, then push hard off the ground as you start down. Your feet should feel light at impact. Tour players generate 150%+ body weight in vertical force.',
    source:'@dannymaude (Danny Maude) Catapult Method: create a wide backswing arc, then feel the club "catapult" through impact using centrifugal force. The key is to stop trying to hit — let the speed happen by releasing tension in the hands and wrists. The body rotation is the engine, the arms are along for the ride.',
    freq:'3x per week, 10 min'},
  iron_distance:{title:'Iron compression — V-Drill',area:'Irons',
    drill:'@dannymaude (Danny Maude) V-Drill for iron compression: place an alignment stick at ~30 degrees on the ground. Swing the shaft to match the stick on the backswing side, then pull the butt of the club around so the shaft matches the stick on the follow-through side. This creates a V-shape path that ensures hands are ahead at impact for solid compression. Start with 9 iron half-shots.',
    source:'Pete Cowen right arm technique: on the downswing, feel the trail arm straighten toward the ball while the body rotates open. This creates the "covering" move that compresses the ball. The trail elbow should point at the trail hip, not behind you.',
    freq:'1x per week per club, 15 min'},
  iron_accuracy:{title:'Tighten iron dispersion — face-to-path',area:'Irons',
    drill:'@theforceplateguy (Michael Dutro): A functional face-to-path relationship is the bottom line of every golf swing. Stop thinking about positions and start measuring your face angle at impact relative to your swing path. Use impact tape or foot spray on the face to check strike location. Center contact with a square face = straight shots. Focus on the CAUSE (pressure pattern, grip) not the EFFECT (ball flight).',
    source:'@dannymaude (Danny Maude): The painting drill — imagine you have paint on the clubhead. On the downswing, paint a line from inside to along the target line. If you slice, paint more to the right. If you hook, paint more to the left. This gives your brain a visual target for the club path rather than thinking about 10 mechanical positions.',
    freq:'1x per week, 20 min'},
  iron_short_miss:{title:'Stop leaving irons short — commit to distance',area:'Irons',
    drill:'Pete Cowen: Most amateurs decelerate through impact because they\'re afraid of going long. The trail arm should ACCELERATE through the ball. Feel the right arm straighten and extend toward the target after impact. Also: take one more club and make a smooth 85% swing — smooth swings with more club produce better contact, more consistent distance, and actually more spin.',
    source:'@theforceplateguy: Check your ground pressure at impact. If you\'re falling backward (pressure on trail foot), you\'re losing compression and distance. At impact, 80%+ of your pressure should be on the lead foot. Practice hitting with a towel under your trail foot — if the towel slides out, your weight shift is correct.',
    freq:'On course, every round for 3 rounds'},
  shortgame_proximity:{title:'Stock chip shot — two families',area:'Short game',
    drill:'@shortgamechef (Parker McLachlin): There are two families of short game shots. Family 1 (chips/pitches) uses a putting-stroke motion — body rotation is the engine, minimal wrist action, trail hand dominant. Family 2 (flops/bunkers) uses wrist hinge. For most shots around the green, Family 1 is all you need. Practice hitting 6 chips with a PW from the fringe — goal is all 6 inside 8 feet. Lower loft = more confidence and consistency.',
    source:'@josephmayogolf (Joseph Mayo): Control your low point and angle of attack. The club should contact the ground at or slightly past the ball — never behind it. Focus on getting your body moving "left" (toward the target) through impact. This naturally creates a descending blow without manipulating your hands. Viktor Hovland\'s short game transformation came from this concept.',
    freq:'2x per week, 20 min'},
  shortgame_bunker:{title:'Modern bunker play — use the bounce',area:'Short game',
    drill:'@shortgamechef (Parker McLachlin): Modern bunker technique — open the face and present MORE loft at impact, not less. Search for a shallow angle of attack so you engage the bounce of the club. Don\'t dig — splash. Make an aggressive swing through the sand. The ball rides out on the cushion of sand. Practice 20 swings with no ball first to build confidence with the splash motion.',
    source:'@josephmayogolf (Joseph Mayo): The key to bunker play is the same as chipping — control your low point. The club enters the sand 1-2 inches behind the ball. Practice drawing a line in the sand and hitting that line consistently. Once you can hit the same spot 10 times in a row, add a ball.',
    freq:'1x per week, 15 min'},
  shortgame_distance_control:{title:'Wedge distance control — backswing length system',area:'Short game',
    drill:'@shortgamechef (Parker McLachlin): Build a stock distance system using backswing length, not effort. With your W56, hit shots at three backswing lengths: hip height (30-40 yds), chest height (50-60 yds), full (75-85 yds). Chart your carry distances. The key: always accelerate through — never decelerate to control distance. The backswing length IS the throttle. Pick a specific landing spot, not a total distance.',
    source:'@josephmayogolf (Joseph Mayo): Use the Vertical Swing Plane concept for wedges — a steeper angle of attack (~7-12 degrees) creates more friction at impact, producing higher spin and more predictable stopping distance. Let the loft and the strike do the work. Don\'t try to help the ball up.',
    freq:'2x per week, 15 min'},
  putting_lag:{title:'Eliminate three-putts — speed is king',area:'Putting',
    drill:'@philkenyonputting (Phil Kenyon): Speed control is one of the three fundamental putting skills. Drill: "Hole 100 feet worth of putts" — putt from 20, 25, 30, 35, 40 feet (totals ~150 ft). Every putt must finish within 3 feet of the hole. Focus ONLY on speed, not line. The key insight: speed and break are connected. Faster putts break less, slower putts break more. Most amateurs hit lag putts too hard, then underread the break.',
    source:'@philkenyonputting: Perception vs Reality test — from 30 feet, hit 5 putts trying to stop them at the hole. Then measure where they actually stopped. Most golfers leave lag putts 3-6 feet short because their perception of "hole speed" is wrong. Recalibrate by putting to the fringe — learn your maximum speed, then dial back.',
    freq:'Before every round, 10 min'},
  putting_short:{title:'Start line mastery — gate drill',area:'Putting',
    drill:'@philkenyonputting (Phil Kenyon): Start line is the #1 fundamental. If you can\'t start the ball on your intended line, everything else breaks down. Gate drill (used by Justin Rose, Tommy Fleetwood, Henrik Stenson): place two tees just wider than your putter head, 5 feet from the hole on a straight putt. Hit 10 putts through the gate. Track your miss tendency — does the ball miss left or right of the gate? This reveals your stroke bias.',
    source:'@philkenyonputting: Once you know your bias, you can compensate in your aim. Most golfers aim where they THINK they\'re aimed, but perception doesn\'t match reality. Set up to a straight putt, close your eyes, then open them — where is your putter actually pointing? Phil has found that most amateurs aim 2-3 degrees off without knowing it.',
    freq:'2x per week, 15 min'},
  putting_read:{title:'Green reading — feel the slope',area:'Putting',
    drill:'@philkenyonputting (Phil Kenyon): Green reading is the third fundamental. Walk around the putt — don\'t just read from behind the ball. Feel the slope with your feet. The lowest point of the area around the hole tells you the dominant break direction. From 15 feet on a breaking putt, hit 3 balls at 3 different speeds: firm (less break), dying (max break), medium. This teaches that speed determines the line, not the other way around.',
    source:'@philkenyonputting: "Whatever techniques you work on, you must master three skills: starting direction, speed control, and break prediction. Every player is different — find what works for YOUR stroke and YOUR eyes." Simplifying green reading to one key variable (is it uphill or downhill, left-to-right or right-to-left) reduces decision paralysis on the course.',
    freq:'On course, every round'},
  course_mgmt_penalties:{title:'Eliminate penalty strokes — smart targets',area:'Course management',
    drill:'Safe miss strategy: before every shot near a hazard, identify the trouble and aim to the opposite side. Accept that bogey is a good score from trouble — hero shots lead to doubles. On the range, practice hitting your bail-out club (hybrid or 5 iron) to a safe target. Decision tree: can you clear the hazard 90% of the time? If not, lay up.',
    source:'@dannymaude: Course management is about playing the percentages. Aim for the center of the green, not the flag. PGA Tour pros aim at the pin only 30% of the time. On par 5s, reaching in 3 to the middle of the green beats a risky 2nd shot into water every time.',
    freq:'On course, every round'},
  course_mgmt_scoring:{title:'Better scoring decisions',area:'Course management',
    drill:'Par is your friend: on par 5s, aim center-green in 3. On tough par 4s, fairway wood off the tee + full iron to the center is smarter than driver into trouble. Track "conservative" rounds vs "aggressive" rounds and compare scores.',
    source:'@theforceplateguy (Michael Dutro): Understand your actual distances — not your best-case distances. Your stock 7-iron is the AVERAGE of 10 shots, not the one that went furthest. Playing to your average eliminates 2-3 penalty situations per round.',
    freq:'On course strategy'},
  shape_slice:{title:'Fix the slice — inside path with ground force',area:'Shot shape',
    drill:'@theforceplateguy (Michael Dutro): The slice is caused by an over-the-top move, which is caused by poor pressure shift. If pressure stays on the trail foot too long, the arms outrace the body and the club comes over the top. Drill: hit 20 half-swing 7-irons focusing ONLY on shifting pressure to the lead foot before the arms start down. The path will naturally shallow.',
    source:'@dannymaude: Grip strength is crucial. Check that you see 2.5-3 knuckles on your lead hand. A simple grip change fixes more slices than any swing thought. Also: the Catapult sling feel — let the club release from the inside rather than steering it with the hands.',
    freq:'3x per week, 15 min'},
  shape_hook:{title:'Fix the hook — Pete Cowen trail arm',area:'Shot shape',
    drill:'Pete Cowen: The hook comes from excessive face closure. The trail arm is the key — feel it stay in front of your body through impact, elbow close to the hip. This prevents the forearms from rolling over too quickly. Practice half shots with a 7-iron where the clubface stays "looking at the target" longer through impact.',
    source:'@dannymaude: Check ball position — too far back promotes an in-to-out path that exaggerates hooks. Move the ball slightly forward. Also try weakening the trail hand grip by rotating it slightly counterclockwise — this naturally reduces face closure at impact.',
    freq:'2x per week, 15 min'},
};

function analyzeGoals(){
  const fr=getFilteredRounds();
  if(!fr.length)return{areas:[],clubWeaknesses:[],missPatterns:[]};
  const allScored=fr.map(r=>scoreRound(r));
  const allAnalyzed=fr.map(r=>analyze(r));

  // Aggregate category scores
  const catTotals={driving:{scores:[],count:0},irons:{scores:[],count:0},shortGame:{scores:[],count:0},putting:{scores:[],count:0}};
  allScored.forEach(rs=>{
    ['driving','irons','shortGame','putting'].forEach(cat=>{
      if(rs[cat].score!==null){catTotals[cat].scores.push(rs[cat].score);catTotals[cat].count+=rs[cat].count}});
  });
  const catAvg={};
  Object.entries(catTotals).forEach(([k,v])=>{catAvg[k]=v.scores.length?Math.round(v.scores.reduce((s,x)=>s+x,0)/v.scores.length):null});

  // Club-level scores
  const clubAgg={};
  allScored.forEach(rs=>{rs.allScores.forEach(s=>{
    const c=s.shot.club;if(!clubAgg[c])clubAgg[c]={scores:[],count:0};
    clubAgg[c].scores.push(s.total);clubAgg[c].count++})});
  const clubAvgs=Object.entries(clubAgg).map(([club,d])=>({
    club,avg:Math.round(d.scores.reduce((s,v)=>s+v,0)/d.scores.length),count:d.count
  })).filter(c=>c.count>=3).sort((a,b)=>a.avg-b.avg);

  // Miss patterns
  const missAgg={driveMiss:{},approachMiss:{},shapeIssues:{},puttIssues:{threePutts:0,totalRounds:S.rounds.length}};
  allAnalyzed.forEach(st=>{
    Object.entries(st.dm).forEach(([k,v])=>{missAgg.driveMiss[k]=(missAgg.driveMiss[k]||0)+v});
    Object.entries(st.am).forEach(([k,v])=>{missAgg.approachMiss[k]=(missAgg.approachMiss[k]||0)+v});
    Object.entries(st.sh).forEach(([k,v])=>{missAgg.shapeIssues[k]=(missAgg.shapeIssues[k]||0)+v});
    missAgg.puttIssues.threePutts+=st.tp3;
  });

  // Build top 3 improvement areas with drills
  const areas=[];

  // Worst category
  const sortedCats=Object.entries(catAvg).filter(([_,v])=>v!==null).sort((a,b)=>a[1]-b[1]);
  sortedCats.forEach(([cat,score])=>{
    if(areas.length>=3)return;
    let drills=[];
    if(cat==='driving'){
      const topMiss=Object.entries(missAgg.driveMiss).sort((a,b)=>b[1]-a[1])[0];
      const topShape=Object.entries(missAgg.shapeIssues).sort((a,b)=>b[1]-a[1])[0];
      if(topShape&&['Slice','Push'].includes(topShape[0]))drills.push(DRILL_DB.driving_slice);
      else if(topShape&&['Hook','Pull'].includes(topShape[0]))drills.push(DRILL_DB.driving_hook);
      else drills.push(DRILL_DB.driving_accuracy);
      if(score<50)drills.push(DRILL_DB.driving_distance);
    }else if(cat==='irons'){
      const topApproachMiss=Object.entries(missAgg.approachMiss).sort((a,b)=>b[1]-a[1])[0];
      if(topApproachMiss&&topApproachMiss[0]==='Rough')drills.push(DRILL_DB.iron_accuracy);
      else drills.push(DRILL_DB.iron_short_miss);
      drills.push(DRILL_DB.iron_distance);
    }else if(cat==='shortGame'){
      const bunkerMisses=(missAgg.approachMiss['Bunker']||0);
      if(bunkerMisses>=3)drills.push(DRILL_DB.shortgame_bunker);
      else drills.push(DRILL_DB.shortgame_proximity);
      drills.push(DRILL_DB.shortgame_distance_control);
    }else if(cat==='putting'){
      const avgTP=missAgg.puttIssues.threePutts/Math.max(missAgg.puttIssues.totalRounds,1);
      if(avgTP>=2)drills.push(DRILL_DB.putting_lag);
      else drills.push(DRILL_DB.putting_short);
      drills.push(DRILL_DB.putting_read);
    }
    areas.push({cat,catLabel:{driving:'Driving',irons:'Irons',shortGame:'Short game',putting:'Putting'}[cat],score,drills});
  });

  // Add course management if penalties are high
  const avgPen=allAnalyzed.reduce((s,a)=>s+a.pen,0)/allAnalyzed.length;
  if(avgPen>=1.5&&areas.length<4){
    areas.push({cat:'management',catLabel:'Course management',score:Math.round(Math.max(0,100-avgPen*25)),
      drills:[DRILL_DB.course_mgmt_penalties,DRILL_DB.course_mgmt_scoring]});
  }

  // Add shape fix if dominant
  const topShape=Object.entries(missAgg.shapeIssues).sort((a,b)=>b[1]-a[1])[0];
  if(topShape&&topShape[1]>=5&&areas.length<4){
    const drill=topShape[0]==='Slice'||topShape[0]==='Push'?DRILL_DB.shape_slice:DRILL_DB.shape_hook;
    areas.push({cat:'shape',catLabel:'Shot shape ('+topShape[0]+')',score:Math.round(Math.max(0,100-topShape[1]*5)),drills:[drill]});
  }

  return{areas:areas.slice(0,3),clubWeaknesses:clubAvgs.slice(0,5),missPatterns:missAgg};
}

function rGoals(el){
  const fr=getFilteredRounds();
  if(!fr.length){el.appendChild(h('div',{class:'card',style:{textAlign:'center',padding:'2rem',color:'var(--fg3)'}},S.rounds.length?'No rounds for this player.':'Enter rounds to generate improvement goals.'));renderPlayerFilter(el);return}
  renderPlayerFilter(el);

  const goals=analyzeGoals();

  el.appendChild(h('div',{class:'st'},'Top 3 areas to improve'));
  el.appendChild(h('div',{style:{fontSize:'0.74rem',color:'var(--fg2)',marginBottom:'1rem',lineHeight:1.5}},
    `Based on ${S.rounds.length} round${S.rounds.length>1?'s':''}, here are your highest-impact improvement areas with targeted practice drills.`));

  goals.areas.forEach((area,idx)=>{
    const card=h('div',{class:'card',style:{marginBottom:'0.85rem',borderLeft:`3px solid ${area.score<40?'var(--danger)':area.score<60?'var(--warn)':'var(--info)'}`,borderRadius:'0 var(--radius-lg) var(--radius-lg) 0'}});

    // Header
    card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.6rem'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:'0.5rem'}},
        h('span',{style:{width:'26px',height:'26px',borderRadius:'50%',background:'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.72rem',fontWeight:600}},String(idx+1)),
        h('span',{style:{fontSize:'0.95rem',fontWeight:500}},area.catLabel)),
      h('div',{style:{display:'flex',alignItems:'center',gap:'0.5rem'}},
        h('span',{style:{fontSize:'0.62rem',color:'var(--fg3)',textTransform:'uppercase'}},'Score'),
        h('span',{style:{fontSize:'1.2rem',fontWeight:600,fontFamily:'var(--font-display)',color:scoreColor100(area.score)}},String(area.score)),
        h('div',{style:{width:'50px'}},h('div',{class:'score-bar'},h('div',{class:'score-fill',style:{width:scoreBarWidth(area.score),background:scoreBarColor(area.score)}})))
      )
    ));

    // Drills
    area.drills.forEach(drill=>{
      if(!drill)return;
      const drillEl=h('div',{style:{background:'var(--bg2)',borderRadius:'var(--radius)',padding:'0.75rem 0.9rem',marginBottom:'0.5rem'}});
      drillEl.appendChild(h('div',{style:{fontWeight:500,fontSize:'0.84rem',marginBottom:'0.35rem',color:'var(--accent)'}},drill.title));
      drillEl.appendChild(h('div',{style:{fontSize:'0.74rem',color:'var(--fg2)',lineHeight:1.55,marginBottom:'0.35rem'}},drill.drill));
      drillEl.appendChild(h('div',{style:{fontSize:'0.72rem',color:'var(--fg2)',lineHeight:1.5,fontStyle:'italic',marginBottom:'0.25rem'}},drill.source));
      drillEl.appendChild(h('div',{style:{fontSize:'0.62rem',color:'var(--fg3)',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.04em'}},'Frequency: '+drill.freq));
      card.appendChild(drillEl);
    });
    el.appendChild(card);
  });

  // Weakest clubs
  if(goals.clubWeaknesses.length>0){
    el.appendChild(h('div',{class:'st',style:{marginTop:'0.75rem'}},'Weakest performing clubs'));
    const tbl=h('div',{class:'card'});
    goals.clubWeaknesses.forEach(cw=>{
      tbl.appendChild(h('div',{class:'score-section'},
        h('div',{class:'score-info'},
          h('div',{class:'score-club-name'},cw.club),
          h('div',{class:'score-club-detail'},cw.count+' total shots'+(PGA_CARRY[cw.club]?' · PGA benchmark: '+PGA_CARRY[cw.club]+'y':''))),
        h('div',{class:'score-value',style:{color:scoreColor100(cw.avg)}},String(cw.avg)),
        h('div',{style:{width:'70px'}},h('div',{class:'score-bar'},h('div',{class:'score-fill',style:{width:scoreBarWidth(cw.avg),background:scoreBarColor(cw.avg)}})))
      ));
    });
    el.appendChild(tbl);
  }

  // Miss patterns summary
  const mp=goals.missPatterns;
  const topDM=Object.entries(mp.driveMiss).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topAM=Object.entries(mp.approachMiss).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topSH=Object.entries(mp.shapeIssues).sort((a,b)=>b[1]-a[1]).slice(0,3);

  if(topDM.length||topAM.length||topSH.length){
    el.appendChild(h('div',{class:'st',style:{marginTop:'0.75rem'}},'Miss patterns'));
    const patCard=h('div',{class:'card'});

    if(topDM.length){
      patCard.appendChild(h('div',{style:{fontSize:'0.68rem',fontWeight:500,color:'var(--fg3)',textTransform:'uppercase',marginBottom:'0.3rem'}},'Drives missing to'));
      patCard.appendChild(h('div',{style:{display:'flex',gap:'0.3rem',flexWrap:'wrap',marginBottom:'0.6rem'}},
        ...topDM.map(([k,v])=>h('span',{class:'ct',style:{fontSize:'0.7rem'}},k+': '+v+'x'))));
    }
    if(topAM.length){
      patCard.appendChild(h('div',{style:{fontSize:'0.68rem',fontWeight:500,color:'var(--fg3)',textTransform:'uppercase',marginBottom:'0.3rem'}},'Approaches ending in'));
      patCard.appendChild(h('div',{style:{display:'flex',gap:'0.3rem',flexWrap:'wrap',marginBottom:'0.6rem'}},
        ...topAM.map(([k,v])=>h('span',{class:'ct',style:{fontSize:'0.7rem'}},k+': '+v+'x'))));
    }
    if(topSH.length){
      patCard.appendChild(h('div',{style:{fontSize:'0.68rem',fontWeight:500,color:'var(--fg3)',textTransform:'uppercase',marginBottom:'0.3rem'}},'Dominant miss shapes'));
      patCard.appendChild(h('div',{style:{display:'flex',gap:'0.3rem',flexWrap:'wrap'}},
        ...topSH.map(([k,v])=>h('span',{class:'ct',style:{fontSize:'0.7rem'}},k+': '+v+'x'))));
    }
    el.appendChild(patCard);
  }

  // Practice schedule suggestion
  el.appendChild(h('div',{class:'st',style:{marginTop:'0.75rem'}},'Suggested weekly practice'));
  const schedCard=h('div',{class:'card'});
  const schedule=[];
  if(goals.areas[0])schedule.push({day:'Session 1',focus:goals.areas[0].catLabel,time:'20 min',detail:goals.areas[0].drills[0]?.title||'Work on weakest area'});
  if(goals.areas[1])schedule.push({day:'Session 2',focus:goals.areas[1].catLabel,time:'20 min',detail:goals.areas[1].drills[0]?.title||'Work on second area'});
  if(goals.areas[2])schedule.push({day:'Session 3',focus:goals.areas[2].catLabel,time:'15 min',detail:goals.areas[2].drills[0]?.title||'Work on third area'});
  schedule.push({day:'Pre-round',focus:'Putting + tempo',time:'15 min',detail:'Ladder drill for lag, then 10 putts from 4 feet for confidence'});

  schedule.forEach(s=>{
    schedCard.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'0.7rem',padding:'0.45rem 0',borderBottom:'0.5px solid var(--border)'}},
      h('div',{style:{minWidth:'70px',fontSize:'0.68rem',fontWeight:500,color:'var(--accent)'}},s.day),
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:'0.78rem',fontWeight:500}},s.focus),
        h('div',{style:{fontSize:'0.66rem',color:'var(--fg3)'}},s.detail)),
      h('div',{style:{fontSize:'0.66rem',color:'var(--fg3)',minWidth:'40px',textAlign:'right'}},s.time)
    ));
  });
  el.appendChild(schedCard);
}

// ─── ROUNDS ────────────────────────────
function rR(el){if(!S.rounds.length){el.appendChild(h('div',{class:'card',style:{textAlign:'center',padding:'2rem',color:'var(--fg3)'}},'No rounds yet.'));return}
  renderPlayerFilter(el);
  const fr=getFilteredRounds();
  el.appendChild(h('div',{class:'st'},`${fr.length} round${fr.length!==1?'s':''}`));
  fr.slice().reverse().forEach(r=>{const s=analyze(r),sc2=scoreRound(r),c=r.conditions,tags=[];
    if(c){if(c.greens)tags.push(c.greens);if(c.weather)c.weather.forEach(w=>tags.push(w))}
    el.appendChild(h('div',{class:'card',style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0.55rem 0.85rem'}},
      h('div',null,h('div',{style:{fontWeight:500,fontSize:'0.86rem'}},r.courseName),
        h('div',{style:{fontSize:'0.68rem',color:'var(--fg3)'}},
          `${r.date}${r.player?' · '+r.player:''}${r.handicap!=null?' ('+r.handicap+' hdcp)':''} · ${s.ts} (${s.diff>=0?'+':''}${s.diff}) · IQ: `,
          h('span',{style:{fontWeight:600,color:scoreColor100(sc2.overall)}},sc2.overall!==null?String(sc2.overall):'—')),
        tags.length?h('div',{style:{display:'flex',gap:'0.2rem',flexWrap:'wrap',marginTop:'0.15rem'}},...tags.map(t=>h('span',{class:'ct'},t))):null),
      h('div',{style:{display:'flex',gap:'0.3rem'}},
        h('button',{class:'btn s',onClick:()=>{S.sri=r.id;S.tab='scores';S.av='single';render()}},'Scores'),
        h('button',{class:'btn s',onClick:()=>{S.sri=r.id;S.tab='analysis';render()}},'Stats'),
        h('button',{class:'btn s d',onClick:()=>{if(confirm('Delete?')){S.rounds=S.rounds.filter(x=>x.id!==r.id);sv();render()}}},'Del'))));
  })}

function xp(){const b=new Blob([DB.exp()],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fairway-iq-'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(a.href);toast('Exported')}
$('#fi').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{const res=DB.imp(ev.target.result);S.courses=DB.g('courses')||[];S.rounds=DB.g('rounds')||[];
    toast(`Imported: ${res.courses} courses, ${res.rounds} rounds`);render()}catch(err){toast('Error: '+err.message)}};r.readAsText(f);this.value=''});

render();
</script></body></html>
